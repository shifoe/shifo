
<!DOCTYPE html> <html lang="ar"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>نسخ الكود</title> <script> function copyCodeAndRedirect() { const code = document.getElementById("code").innerText; navigator.clipboard.writeText(code).then(() => { alert("تم نسخ الكود: " + code); window.location.href = "https://www.noon.com/saudi-ar/"; // الرابط الذي تريد الدخول إليه }).catch(err => { alert("عذرًا، لم نتمكن من نسخ الكود: " + err); }); } </script> </head> <body> <pre id="code">NDX150</pre> <button onclick="copyCodeAndRedirect()">نسخ الكود والدخول للرابط</button> </body> </html>
